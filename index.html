<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Comparador de Chaves Premium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
        /* Cores e Temas (Identidade Visual Premium) */
        --bg-primary: #0a0e1a; --bg-secondary: #0f1419; --bg-tertiary: #151b26;
        --surface-1: rgba(255, 255, 255, 0.02); --surface-2: rgba(255, 255, 255, 0.04); --surface-3: rgba(255, 255, 255, 0.06);
        --text-primary: #ffffff; --text-secondary: #a8b2d1; --text-muted: #6b7494;
        --accent: #00d4ff; --accent-glow: rgba(0, 212, 255, 0.3);
        --success: #00ff88; --warning: #ffaa00; --error: #ff4757;
        --border: rgba(255, 255, 255, 0.1); --border-focus: rgba(0, 212, 255, 0.4);
        
        /* Sombras e Bordas */
        --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.1); --shadow-md: 0 8px 25px rgba(0, 0, 0, 0.15); --shadow-lg: 0 15px 35px rgba(0, 0, 0, 0.2);
        --shadow-accent: 0 8px 25px var(--accent-glow);
        --radius-md: 12px; --radius-xl: 24px; --radius-sm: 8px; --radius-lg: 16px;
    }

    /* ── Reset e base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 50%, var(--bg-tertiary) 100%);
        color: var(--text-primary); line-height: 1.6; min-height: 100vh; overflow-x: hidden;
        display: flex;
        flex-direction: column;
    }

    /* Animação de Fundo */
    body::before {
        content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle at 20% 50%, rgba(0, 212, 255, 0.05) 0%, transparent 50%),
                    radial-gradient(circle at 80% 20%, rgba(0, 255, 136, 0.05) 0%, transparent 50%),
                    radial-gradient(circle at 40% 80%, rgba(255, 170, 0, 0.05) 0%, transparent 50%);
        pointer-events: none; z-index: -1; animation: float 20s ease-in-out infinite;
    }
    @keyframes float { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-20px) rotate(5deg); } }

    .container { max-width: 1200px; margin: 0 auto; padding: 2rem; position: relative; z-index: 1; flex: 1; width: 100%; }

    /* ── Cabeçalho ── */
    .header { display: flex; align-items: center; gap: 1.5rem; margin-bottom: 3rem; padding: 1.5rem 0; justify-content: center; text-align: left; }
    @media (max-width: 620px) { .header { flex-direction: column; text-align: center; } }
    
    .logo { width: 64px; height: 64px; border-radius: var(--radius-lg); box-shadow: var(--shadow-accent), inset 0 1px 0 rgba(255, 255, 255, 0.2); position: relative; overflow: hidden; flex-shrink: 0; }
    .logo img { width: 100%; height: 100%; object-fit: cover; }
    
    .header-content h1 {
        font-size: clamp(1.8rem, 4vw, 2.5rem); font-weight: 800; background: linear-gradient(135deg, var(--text-primary), var(--accent));
        -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        margin-bottom: 0.5rem; letter-spacing: -0.02em;
    }
    .header-content p { color: var(--text-secondary); font-size: 1.1rem; max-width: 600px; font-weight: 400; }
    .tip-realtime { font-weight: 600; color: var(--accent); }

    /* ── Layout e Cards ── */
    .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-bottom: 2rem; }
    @media (max-width: 768px) { .input-grid { grid-template-columns: 1fr; } }

    .card {
        background: linear-gradient(135deg, var(--surface-1) 0%, var(--surface-2) 100%); border: 1px solid var(--border);
        border-radius: var(--radius-xl); padding: 2rem; box-shadow: var(--shadow-lg); backdrop-filter: blur(10px);
        position: relative; overflow: hidden; transition: all 0.3s ease;
    }
    .card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg), 0 0 40px rgba(0, 212, 255, 0.05); border-color: var(--border-focus); }

    .card-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border); }
    .card-header h2 { font-size: 1.2rem; font-weight: 700; color: var(--text-primary); text-transform: uppercase; letter-spacing: 0.05em; }
    .card-header .icon { width: 32px; height: 32px; border-radius: var(--radius-sm); background: var(--surface-3); display: flex; align-items: center; justify-content: center; font-size: 16px; border: 1px solid var(--border); }

    /* ── Textarea ── */
    .card textarea {
        width: 100%; height: 120px; border: 1px solid var(--border); border-radius: var(--radius-md);
        padding: 1rem 1.25rem; font-size: 1rem; font-family: 'Courier New', Courier, monospace;
        color: var(--text-primary); background-color: var(--surface-2); resize: vertical;
        transition: all 0.3s ease; backdrop-filter: blur(5px); outline: none;
    }
    .card textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1), var(--shadow-md); background: var(--surface-3); }
    .card textarea::placeholder { color: var(--text-muted); }

    /* ── Barra de ações ── */
    .action-bar { display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
    
    .btn { padding: 1rem 2rem; border: none; border-radius: var(--radius-md); font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; gap: 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
    .btn-primary { background: linear-gradient(135deg, var(--accent), #0099cc); color: #000; box-shadow: var(--shadow-accent); }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 12px 30px rgba(0, 212, 255, 0.4); }
    .btn-primary:active { transform: translateY(0); }
    
    .btn-secondary { background: var(--surface-2); color: var(--text-primary); border: 1px solid var(--border); }
    .btn-secondary:hover { background: var(--surface-3); border-color: var(--accent); transform: translateY(-1px); }

    .tip { font-size: 0.85rem; color: var(--text-muted); text-align: center; margin-bottom: 2rem; }
    kbd { background: var(--surface-3); padding: 0.2rem 0.5rem; border-radius: 4px; border: 1px solid var(--border); font-family: monospace; }

    /* ── Card de resultado ── */
    #resultado-card { display: none; margin-top: 2rem; }

    .secao-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; margin-top: 2rem; }
    .secao-header:first-child { margin-top: 0; }
    
    .secao-titulo { font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-secondary); margin: 0; }

    /* Botão de Cópia Limpa */
    .btn-icon-copy {
        background: var(--surface-2); border: 1px solid var(--border); cursor: pointer; color: var(--accent);
        font-size: 0.8rem; font-weight: 600; display: flex; align-items: center; gap: 6px; padding: 6px 12px;
        border-radius: var(--radius-sm); transition: all 0.2s;
    }
    .btn-icon-copy:hover { background: var(--surface-3); border-color: var(--accent); color: var(--text-primary); }

    /* ── Exibição dos dígitos ── */
    .digits-display {
        font-family: 'Courier New', Courier, monospace; font-size: 1.2rem; font-weight: 500;
        background: var(--surface-1); border: 1px solid var(--border); border-radius: var(--radius-md);
        padding: 1.5rem; word-break: break-all; line-height: 2; letter-spacing: 2px; min-height: 80px;
        box-shadow: inset 0 2px 10px rgba(0,0,0,0.2);
    }

    /* ── Destaque de dígito divergente (Tema Escuro) ── */
    .digit-diff { background-color: rgba(255, 71, 87, 0.2); color: var(--error); font-weight: 800; border-radius: 4px; padding: 2px 4px; border: 1px solid rgba(255, 71, 87, 0.3); }
    .digit-pad { color: var(--text-muted); opacity: 0.5; background: none; border: 1px dashed var(--border); }

    /* ── Badge de status ── */
    .status-badge { display: inline-flex; align-items: center; gap: 10px; padding: 1rem 1.5rem; border-radius: var(--radius-md); font-size: 1.1rem; font-weight: 700; width: 100%; justify-content: center; }
    .status-ok   { background: rgba(0, 255, 136, 0.1); color: var(--success); border: 1px solid rgba(0, 255, 136, 0.3); }
    .status-diff { background: rgba(255, 71, 87, 0.1); color: var(--error); border: 1px solid rgba(255, 71, 87, 0.3); }

    /* ── Caixa de análise técnica ── */
    .analise-box { background: var(--surface-1); border-left: 4px solid var(--accent); padding: 1.5rem; border-radius: 0 var(--radius-md) var(--radius-md) 0; font-size: 1rem; color: var(--text-primary); line-height: 1.8; border: 1px solid var(--border); border-left-width: 4px; }
    .analise-box.alerta { border-left-color: var(--warning); background: linear-gradient(90deg, rgba(255, 170, 0, 0.05) 0%, transparent 100%); }
    .analise-box ul { margin: 10px 0 0 24px; color: var(--text-secondary); }
    .analise-box li { margin-bottom: 5px; }
    .analise-box strong { color: var(--text-primary); }

    .divider { border: none; border-top: 1px solid var(--border); margin: 2rem 0; opacity: 0.5; }

    /* ── Rodapé ── */
    .footer { padding: 2rem; border-top: 1px solid var(--border); color: var(--text-muted); font-size: 0.9rem; text-align: center; margin-top: auto; width: 100%; background: var(--bg-primary); z-index: 1; }
  </style>
</head>
<body>

  <div class="container">
    <header class="header">
      <div class="logo"><img src="https://raw.githubusercontent.com/Halexandre1/PDF_PRO/main/HERBERT.jpg" alt="Logótipo"></div>
      <div class="header-content">
        <h1>Comparador Premium</h1>
        <p>Validação avançada de chaves de boleto. <span class="tip-realtime">A comparação é instantânea.</span></p>
      </div>
    </header>

    <!-- ── Campos de entrada ── -->
    <div class="input-grid">
      <div class="card">
        <div class="card-header"><div class="icon">📄</div><h2>SIENGE</h2></div>
        <textarea id="inp-sienge" placeholder="Cole aqui a chave gerada pelo SIENGE..."></textarea>
      </div>
      <div class="card">
        <div class="card-header"><div class="icon">🏦</div><h2>BOLETO</h2></div>
        <textarea id="inp-boleto" placeholder="Cole aqui a linha digitável do Boleto..."></textarea>
      </div>
    </div>

    <!-- ── Ações ── -->
    <div class="action-bar">
      <button class="btn btn-primary" onclick="comparar()" id="btn-forcar-comparar">🔍 Comparar</button>
      <button class="btn btn-secondary" onclick="limpar()">🗑️ Limpar</button>
    </div>
    <p class="tip">Dica: pressiona <kbd>Ctrl</kbd> + <kbd>Enter</kbd> para comparar rapidamente caso necessário.</p>

    <!-- ── Área de resultado ── -->
    <div class="card" id="resultado-card">

      <div class="secao-header">
        <h3 class="secao-titulo">SIENGE (Normalizado)</h3>
        <button class="btn-icon-copy" onclick="copiarChave('sienge', this)" title="Copiar apenas os números">
          📋 Copiar Limpa
        </button>
      </div>
      <div class="digits-display" id="out-sienge"></div>

      <hr class="divider" />

      <div class="secao-header">
        <h3 class="secao-titulo">BOLETO (Normalizado)</h3>
        <button class="btn-icon-copy" onclick="copiarChave('boleto', this)" title="Copiar apenas os números">
          📋 Copiar Limpa
        </button>
      </div>
      <div class="digits-display" id="out-boleto"></div>

      <hr class="divider" />

      <div class="secao-header"><h3 class="secao-titulo">Resultado Final</h3></div>
      <div id="out-status"></div>

      <hr class="divider" />

      <div class="secao-header"><h3 class="secao-titulo">Análise Técnica</h3></div>
      <div class="analise-box" id="out-analise"></div>

    </div>
  </div>

  <footer class="footer" id="signature"></footer>

  <script>
    // Configurar a assinatura no rodapé automaticamente
    document.getElementById('signature').innerHTML = `<p>Feito por HAlexandre © ${new Date().getFullYear()} - Premium Edition</p>`;

    let chaveLimpaSienge = '';
    let chaveLimpaBoleto = '';

    function normalizar(texto) {
      return texto.replace(/\D/g, '');
    }

    function gerarHTML(str, referencia, maxLen) {
      if (!str && !referencia) return '<em style="color:var(--text-muted);font-style:italic">— vazio —</em>';

      let html = '';
      for (let i = 0; i < maxLen; i++) {
        const c    = str[i];
        const cRef = referencia[i]; 

        if (c === undefined) {
          html += `<span class="digit-diff digit-pad" title="Posição ${i + 1} ausente">-</span>`;
        } 
        else if (cRef === undefined || c !== cRef) {
          html += `<span class="digit-diff" title="Posição ${i + 1}">${c}</span>`;
        } 
        else {
          html += `<span>${c}</span>`;
        }
      }
      return html;
    }

    function copiarChave(tipo, btnEl) {
      const textoCopia = tipo === 'sienge' ? chaveLimpaSienge : chaveLimpaBoleto;
      
      if (!textoCopia) return;

      navigator.clipboard.writeText(textoCopia).then(() => {
        const textoOriginal = btnEl.innerHTML;
        btnEl.innerHTML = '✔️ Copiado!';
        btnEl.style.color = 'var(--success)';
        btnEl.style.borderColor = 'var(--success)';
        
        setTimeout(() => {
          btnEl.innerHTML = textoOriginal;
          btnEl.style.color = ''; 
          btnEl.style.borderColor = '';
        }, 2000);
      }).catch(err => {
        console.error('Falha ao copiar:', err);
        alert('Não foi possível copiar. Verifica as permissões do navegador.');
      });
    }

    function comparar() {
      const rawSienge = document.getElementById('inp-sienge').value;
      const rawBoleto = document.getElementById('inp-boleto').value;

      chaveLimpaSienge = normalizar(rawSienge);
      chaveLimpaBoleto = normalizar(rawBoleto);

      if (!chaveLimpaSienge && !chaveLimpaBoleto) {
        document.getElementById('resultado-card').style.display = 'none';
        return;
      }

      const maxLen = Math.max(chaveLimpaSienge.length, chaveLimpaBoleto.length);
      let totalDiv = 0;
      let primeiraDiv = -1;

      for (let i = 0; i < maxLen; i++) {
        if (chaveLimpaSienge[i] !== chaveLimpaBoleto[i]) {
          totalDiv++;
          if (primeiraDiv === -1) primeiraDiv = i + 1;
        }
      }

      const identicos  = (chaveLimpaSienge === chaveLimpaBoleto);
      const tamDif     = chaveLimpaSienge.length !== chaveLimpaBoleto.length;

      document.getElementById('out-sienge').innerHTML = gerarHTML(chaveLimpaSienge, chaveLimpaBoleto, maxLen);
      document.getElementById('out-boleto').innerHTML = gerarHTML(chaveLimpaBoleto, chaveLimpaSienge, maxLen);

      const statusEl = document.getElementById('out-status');
      if (identicos) {
        statusEl.innerHTML = `<span class="status-badge status-ok">✅ OK – As chaves são idênticas.</span>`;
      } else {
        statusEl.innerHTML = `<span class="status-badge status-diff">❌ DIFERENTE – As chaves não coincidem.</span>`;
      }

      const analiseEl = document.getElementById('out-analise');
      if (identicos) {
        analiseEl.className = 'analise-box';
        analiseEl.innerHTML = `
          ✅ Nenhuma divergência encontrada.
          <ul>
            <li>Dígitos em SIENGE: <strong>${chaveLimpaSienge.length}</strong></li>
            <li>Dígitos em BOLETO: <strong>${chaveLimpaBoleto.length}</strong></li>
          </ul>`;
      } else {
        analiseEl.className = 'analise-box alerta';
        let html = '';

        if (tamDif) {
          html += `⚠️ <strong>Diferença na quantidade de dígitos.</strong><br>`;
        }

        html += `<ul>
          <li>Dígitos em SIENGE: <strong>${chaveLimpaSienge.length}</strong></li>
          <li>Dígitos em BOLETO: <strong>${chaveLimpaBoleto.length}</strong></li>
          <li>Primeira divergência na posição: <strong>${primeiraDiv > 0 ? primeiraDiv : 'N/A'}</strong></li>
          <li>Total de dígitos divergentes: <strong>${totalDiv}</strong></li>
        </ul>`;

        analiseEl.innerHTML = html;
      }

      const card = document.getElementById('resultado-card');
      card.style.display = 'block';
    }

    function limpar() {
      document.getElementById('inp-sienge').value = '';
      document.getElementById('inp-boleto').value = '';
      document.getElementById('resultado-card').style.display = 'none';
      chaveLimpaSienge = '';
      chaveLimpaBoleto = '';
      document.getElementById('inp-sienge').focus();
    }

    document.getElementById('inp-sienge').addEventListener('input', comparar);
    document.getElementById('inp-boleto').addEventListener('input', comparar);

    document.addEventListener('keydown', function (e) {
      if (e.ctrlKey && e.key === 'Enter') {
        comparar();
        const card = document.getElementById('resultado-card');
        if (card.style.display === 'block') {
          card.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      }
    });
  </script>
</body>
</html>
